<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nepal AI Scholar - Aashish Patel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Mukta:wght@300;400;600;700&display=swap');
        body { font-family: 'Mukta', sans-serif; background-color: #f1f5f9; }
        .nepal-gradient { background: linear-gradient(135deg, #DC143C 0%, #003893 100%); }
        .glass-card { background: white; border: 1px solid #e2e8f0; }
        .chat-bubble-user { background-color: #003893; color: white; border-radius: 15px 15px 2px 15px; align-self: flex-end; }
        .chat-bubble-ai { background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 15px 15px 15px 2px; align-self: flex-start; }
        .mic-active { color: #DC143C; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="min-h-screen">

    <nav class="nepal-gradient text-white py-4 px-6 sticky top-0 z-50 flex justify-between items-center shadow-lg">
        <h1 class="text-xl font-bold">🇳🇵 Nepal Scholar AI</h1>
        <div class="flex gap-4">
            <i class="fas fa-history cursor-pointer opacity-70 hover:opacity-100" onclick="location.reload()"></i>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-6 max-w-xl">
        
        <div id="uploadCard" class="glass-card rounded-3xl p-6 shadow-sm mb-6 transition-all duration-500">
            <div class="grid grid-cols-2 gap-3 mb-6">
                <select id="classSelect" class="p-3 bg-slate-50 border rounded-xl font-bold outline-none">
                    <option value="1">Class 1</option><option value="2">Class 2</option>
                    <option value="3">Class 3</option><option value="4">Class 4</option>
                    <option value="5" selected>Class 5</option><option value="6">Class 6</option>
                    <option value="7">Class 7</option><option value="8">Class 8 (BLE)</option>
                    <option value="9">Class 9</option><option value="10">Class 10 (SEE)</option>
                </select>
                <select id="langSelect" class="p-3 bg-slate-50 border rounded-xl font-bold outline-none">
                    <option value="Nepali">Nepali</option>
                    <option value="English">English</option>
                    <option value="Hindi">Hindi</option>
                </select>
            </div>

            <div id="dropZone" class="border-2 border-dashed border-slate-300 rounded-3xl p-10 text-center cursor-pointer hover:bg-red-50 transition-all">
                <input type="file" id="fileInput" accept="image/*" class="hidden">
                <div id="emptyView">
                    <i class="fas fa-file-upload text-4xl text-red-500 mb-3"></i>
                    <p class="font-bold text-slate-700">Photo Upload Garnuhos</p>
                    <p class="text-xs text-slate-400">Class 1-10 Book Pages</p>
                </div>
                <div id="previewView" class="hidden">
                    <img id="imgPreview" src="#" class="mx-auto max-h-48 rounded-xl shadow-sm border">
                    <p class="mt-3 text-red-600 text-xs font-bold">Change Photo</p>
                </div>
            </div>

            <button id="solveBtn" class="hidden w-full mt-6 nepal-gradient text-white font-bold py-4 rounded-2xl shadow-md active:scale-95 transition-all flex items-center justify-center gap-2">
                <i class="fas fa-brain"></i> SOLVE FAST
            </button>
        </div>

        <div id="loader" class="hidden text-center py-10">
            <div class="inline-block w-8 h-8 border-4 border-red-600 border-t-transparent rounded-full animate-spin"></div>
            <p class="mt-4 text-slate-600 font-bold">AI is reading the page...</p>
        </div>

        <div id="resultArea" class="hidden space-y-6">
            <div class="glass-card rounded-3xl p-6 shadow-sm border-l-4 border-red-600">
                <h3 class="text-xs font-bold text-slate-400 uppercase mb-4 tracking-widest">Solutions</h3>
                <div id="ansText" class="text-slate-800 leading-relaxed text-lg"></div>
            </div>

            <div class="glass-card rounded-3xl shadow-sm flex flex-col h-[400px]">
                <div class="p-4 border-b bg-slate-50 rounded-t-3xl font-bold text-sm text-slate-600 flex items-center gap-2">
                    <i class="fas fa-comment-dots text-blue-700"></i> AI Chat Assistant
                </div>
                <div id="chatBox" class="flex-1 p-4 overflow-y-auto flex flex-col gap-3 bg-slate-50/30">
                    <div class="chat-bubble-ai p-3 text-sm">Yo solution ma kehi confusion chha bhane sodhnuhos!</div>
                </div>
                <div class="p-3 border-t flex gap-2 items-center bg-white rounded-b-3xl">
                    <button id="micBtn" class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 hover:text-red-600">
                        <i class="fas fa-microphone"></i>
                    </button>
                    <input type="text" id="chatInput" placeholder="Sodhnuhos..." class="flex-1 p-2 bg-slate-50 rounded-lg outline-none text-sm border focus:border-blue-400">
                    <button id="sendChat" class="w-10 h-10 rounded-full nepal-gradient text-white flex items-center justify-center">
                        <i class="fas fa-paper-plane text-xs"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // AAPKI API KEY YAHAN HAI
        const apiKey = "gen-lang-client-0784881556"; 
        
        const dom = {
            in: document.getElementById('fileInput'),
            drop: document.getElementById('dropZone'),
            empty: document.getElementById('emptyView'),
            prev: document.getElementById('previewView'),
            img: document.getElementById('imgPreview'),
            btn: document.getElementById('solveBtn'),
            load: document.getElementById('loader'),
            res: document.getElementById('resultArea'),
            ans: document.getElementById('ansText'),
            cls: document.getElementById('classSelect'),
            lang: document.getElementById('langSelect'),
            chatIn: document.getElementById('chatInput'),
            send: document.getElementById('sendChat'),
            chatBox: document.getElementById('chatBox'),
            mic: document.getElementById('micBtn'),
            card: document.getElementById('uploadCard')
        };

        let currentImgBase64 = "";
        let solutionContext = "";

        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (Speech) {
            const rec = new Speech();
            rec.lang = 'ne-NP';
            rec.onresult = (e) => {
                dom.chatIn.value = e.results[0][0].transcript;
                dom.mic.classList.remove('mic-active');
            };
            dom.mic.onclick = () => {
                dom.mic.classList.add('mic-active');
                rec.start();
            };
        }

        dom.drop.onclick = () => dom.in.click();

        dom.in.onchange = (e) => {
            const f = e.target.files[0];
            if(!f) return;
            const r = new FileReader();
            r.onload = (ev) => {
                dom.img.src = ev.target.result;
                dom.empty.classList.add('hidden');
                dom.prev.classList.remove('hidden');
                dom.btn.classList.remove('hidden');
                dom.res.classList.add('hidden');
                
                const i = new Image();
                i.src = ev.target.result;
                i.onload = () => {
                    const c = document.createElement('canvas');
                    const s = Math.min(1, 1000/i.width);
                    c.width = i.width*s; c.height = i.height*s;
                    c.getContext('2d').drawImage(i, 0,0,c.width,c.height);
                    currentImgBase64 = c.toDataURL('image/jpeg', 0.8).split(',')[1];
                };
            };
            r.readAsDataURL(f);
        };

        async function callGemini(contents) {
            const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents })
            });
            return await r.json();
        }

        dom.btn.onclick = async () => {
            dom.btn.classList.add('hidden');
            dom.load.classList.remove('hidden');
            
            const systemPrompt = `You are an Educational Assistant for students in Nepal. 
            IMAGE ANALYSIS TASK: 
            1. Extract all questions from the provided textbook image for Class ${dom.cls.value}. 
            2. Solve them accurately in ${dom.lang.value}.
            3. Follow CDC Nepal guidelines. 
            DO NOT REFUSE to read the image. This is for homework help. 
            If text is blurry, do your best to transcribe and solve. 
            Format: Use bold for questions and clear steps for answers.`;

            try {
                const data = await callGemini([{ parts: [
                    { text: systemPrompt }, 
                    { inlineData: { mimeType: "image/jpeg", data: currentImgBase64 } }
                ]}]);
                
                solutionContext = data.candidates?.[0]?.content?.parts?.[0]?.text || "Mafi chahanchhu, maile padhna sakina.";
                dom.ans.innerHTML = solutionContext.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<b class="text-red-700">$1</b>');
                
                dom.load.classList.add('hidden');
                dom.res.classList.remove('hidden');
                dom.card.classList.add('opacity-50', 'scale-95');
                dom.res.scrollIntoView({ behavior: 'smooth' });
            } catch (err) {
                dom.load.classList.add('hidden');
                dom.btn.classList.remove('hidden');
                alert("API Error! Please check your Key.");
            }
        };

        dom.send.onclick = async () => {
            const msg = dom.chatIn.value.trim();
            if(!msg) return;

            addBubble('user', msg);
            dom.chatIn.value = "";
            const botB = addBubble('ai', "Thinking...");

            const chatP = `Context: ${solutionContext}\nUser Question: ${msg}\nHelp the student in ${dom.lang.value} for Class ${dom.cls.value}.`;

            try {
                const d = await callGemini([{ parts: [{ text: chatP }] }]);
                botB.innerText = d.candidates?.[0]?.content?.parts?.[0]?.text || "Error.";
                dom.chatBox.scrollTop = dom.chatBox.scrollHeight;
            } catch (e) { botB.innerText = "Error calling AI."; }
        };

        function addBubble(role, txt) {
            const d = document.createElement('div');
            d.className = `p-3 text-sm max-w-[85%] ${role === 'user' ? 'chat-bubble-user' : 'chat-bubble-ai'}`;
            d.innerText = txt;
            dom.chatBox.appendChild(d);
            dom.chatBox.scrollTop = dom.chatBox.scrollHeight;
            return d;
        }
    </script>
</body>
</html>
